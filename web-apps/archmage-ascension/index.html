<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js', { scope: './' })
      .catch((err) => console.warn('Archmage service worker registration failed', err));
  });
}
</script>
