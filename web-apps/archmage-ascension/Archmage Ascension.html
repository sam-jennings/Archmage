<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Archmage Ascension</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#04020c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Archmage"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" onerror="this.remove()"/>
<link rel="stylesheet" href="game/lib/tokens.css"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link rel="stylesheet" href="game/styles.css"/>
</head>
<body>
<div id="stage" class="aa-stage">
<div id="root">
  <div class="aa-loading" role="status" aria-live="polite">
    <div class="aa-loading-glyph"></div>
    <div class="aa-loading-label">Summoning the Source</div>
  </div>
</div>
</div>

<!-- Card renderer + variants -->
<script src="game/lib/cards.js"></script>
<script src="game/lib/connectors/bloom-soft.js"></script>
<script src="game/lib/connectors/notch.js"></script>
<script src="game/lib/connectors/celestial.js"></script>
<script src="game/lib/connectors/triangle.js"></script>
<script src="game/lib/art/mystic.js"></script>
<script src="game/lib/art/ritual.js"></script>
<script src="game/lib/art/sigil.js"></script>
<script src="game/lib/art/runic.js"></script>

<!-- Game engine + state machine -->
<script src="game/engine.js"></script>
<script src="game/state.js"></script>
<script src="game/ai.js"></script>

<!-- Pointer Events drag controller (replaces HTML5 drag-and-drop for touch) -->
<script src="game/drag-controller.js"></script>

<!-- React + Babel (vendored locally — offline-friendly, no SRI/CDN) -->
<script src="vendor/react.min.js"></script>
<script src="vendor/react-dom.min.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- Components, in dependency order -->
<script type="text/babel" src="game/cards-ui.jsx"></script>
<script type="text/babel" src="game/spell-tableau.jsx"></script>
<script type="text/babel" src="game/cauldron.jsx"></script>
<script type="text/babel" src="game/title.jsx"></script>
<script type="text/babel" src="game/endgame.jsx"></script>
<script type="text/babel" src="game/play.jsx"></script>
<script type="text/babel" src="game/tweaks-panel.jsx"></script>
<script type="text/babel" src="game/app.jsx"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js', { scope: './' })
      .catch((err) => console.warn('Archmage service worker registration failed', err));
  });
}
</script>
</body>
</html>
